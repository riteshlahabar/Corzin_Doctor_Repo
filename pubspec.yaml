name: corzin_doctor
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  get: ^4.7.2
  http: ^1.2.2
  shared_preferences: ^2.5.3
  file_picker: ^10.1.2
  intl: ^0.20.2
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Avenir
      fonts:
        - asset: assets/fonts/AvenirRegular.ttf
          weight: 400
        - asset: assets/fonts/AvenirMedium.ttf
          weight: 500
        - asset: assets/fonts/AvenirHeavy.ttf
          weight: 700
        - asset: assets/fonts/AvenirBlack.ttf
          weight: 900
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SFProDisplayRegular.ttf
          weight: 400
        - asset: assets/fonts/SFProDisplayBold.ttf
          weight: 700
    - family: SF Pro Text
      fonts:
        - asset: assets/fonts/SFProTextRegular.ttf
          weight: 400
        - asset: assets/fonts/SFProTextBold.ttf
          weight: 700
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSansMedium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansBold.ttf
          weight: 700
    - family: Manrope
      fonts:
        - asset: assets/fonts/ManropeMedium.ttf
          weight: 500
    - family: Outfit
      fonts:
        - asset: assets/fonts/OutfitRegular.ttf
          weight: 400
    - family: Proxima Nova
      fonts:
        - asset: assets/fonts/ProximaNovaBold.ttf
          weight: 700
    - family: OCRA Extended
      fonts:
        - asset: assets/fonts/OCRAExtended.ttf
          weight: 400
